<div class="shell shell--project">
  <div class="shell__card">
    <section class="project-detail">
      <a class="back-link" routerLink="/">
        <span aria-hidden="true">←</span> Back to Home Page
      </a>

      <div class="project-detail__mockup" aria-hidden="true">
        <div class="project-detail__phone">
          <div class="project-detail__screen"></div>
        </div>
      </div>

      <h1 class="project-detail__title">{{ project.title }}</h1>
      <p class="project-detail__category">{{ project.category }}</p>

      <h2 class="section-title">About The Project</h2>
      <p class="project-detail__about">{{ project.about }}</p>

      <h2 class="section-title">Achievements</h2>
      <ul class="project-detail__achievements">
        @for (item of project.achievements; track item) {
          <li>{{ item }}</li>
        }
      </ul>
    </section>
  </div>
</div>
